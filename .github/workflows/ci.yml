name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check (bash -n)
        run: |
          bash -n scripts/bootstrap.sh
          bash -n scripts/setup-desktop.sh
          bash -n scripts/check-consistency.sh
          bash -n templates/sessionizer

      - name: Shellcheck
        run: |
          shellcheck scripts/bootstrap.sh
          shellcheck scripts/setup-desktop.sh
          shellcheck scripts/check-consistency.sh
          shellcheck templates/sessionizer

      - name: Consistency checks
        run: bash scripts/check-consistency.sh
