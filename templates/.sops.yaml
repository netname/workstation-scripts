# .sops.yaml — copy to the root of your PRIVATE dotfiles repository.
#
# Replace the placeholder with your Age public recipient:
#   age-keygen -y ~/.config/sops/age/keys.txt
#
# Verify this file before creating secrets:
#   bash scripts/check-secrets.sh
#
# Then create encrypted files under secrets/:
#   sops secrets/workstation.yaml
keys:
  - &workstation_user age1replace_with_your_age_public_key

creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|yml|json|env|ini)$
    key_groups:
      - age:
          - *workstation_user
